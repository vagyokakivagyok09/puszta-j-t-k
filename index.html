<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Természetismeret Játék 🌱 – 5. évfolyam</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --grass:#22c55e;--grass-light:#4ade80;
  --earth:#f59e0b;--earth-dark:#92400e;
  --sun:#fbbf24;--sun-warm:#f59e0b;
  --water:#38bdf8;--water-light:#7dd3fc;
  --true-col:#22c55e;--true-bg:rgba(34,197,94,0.12);
  --false-col:#f43f5e;--false-bg:rgba(244,63,94,0.12);
  --card-bg:rgba(30,30,50,0.85);--text-dark:#f0f0f8;--text-mid:#94a3b8;
  --accent:#7c3aed;--accent2:#0ea5e9;
  --border:rgba(255,255,255,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;min-height:100vh;background:#12121f;color:var(--text-dark);overflow-x:hidden;}
.particle{position:fixed;border-radius:50%;pointer-events:none;animation:floatUp linear infinite;opacity:0;}
@keyframes floatUp{0%{transform:translateY(110vh) scale(0);opacity:0}10%{opacity:.7}90%{opacity:.2}100%{transform:translateY(-10vh) scale(1.2);opacity:0}}
.bg-deco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-deco::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(124,58,237,.10) 0%,transparent 70%);}
.bg-deco::after{content:'';position:absolute;bottom:-20%;left:10%;width:80%;height:60%;background:radial-gradient(ellipse at 50% 100%,rgba(34,197,94,.06) 0%,transparent 70%);}
.sun-fixed{display:none;}
#app{position:relative;z-index:2;max-width:860px;margin:0 auto;padding:16px 14px 70px;}
header{text-align:center;padding:32px 10px 14px;}
header h1{font-family:'DM Serif Display',serif;font-style:italic;font-size:2.4rem;font-weight:400;color:#fff;letter-spacing:-.01em;line-height:1.1;text-shadow:0 0 40px rgba(124,58,237,.5);}
header h1 em{color:#7c3aed;font-style:normal;}
header p{margin-top:6px;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:#334155;font-weight:500;}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(0.97)}to{opacity:1;transform:none}}
.card{background:rgba(22,22,40,0.90);border-radius:20px;padding:26px 24px 22px;border:1px solid var(--border);box-shadow:0 0 0 1px rgba(124,58,237,.1), 0 20px 60px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05);animation:cardIn 0.35s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(12px);}
.card::before{content:'';position:absolute;inset:0;border-radius:20px;background:linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 50%);pointer-events:none;}
.card{position:relative;}
.name-screen{text-align:center;}
.name-screen h2{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.7rem;font-weight:400;color:#fff;margin-bottom:8px;text-shadow:0 0 20px rgba(124,58,237,.4);}
.name-screen p{color:var(--text-mid);font-size:.9rem;margin-bottom:24px;font-weight:400;letter-spacing:.03em;}
.name-input{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:500;padding:13px 18px;border-radius:12px;border:1px solid rgba(124,58,237,.4);width:100%;max-width:320px;text-align:center;outline:none;color:#fff;background:rgba(124,58,237,.08);box-shadow:0 0 0 0 rgba(124,58,237,0);margin-bottom:20px;display:block;margin-left:auto;margin-right:auto;transition:border-color .2s, box-shadow .2s;}
.name-input:focus{border-color:rgba(124,58,237,.8);box-shadow:0 0 0 3px rgba(124,58,237,.2);}
.name-input::placeholder{color:#334155;}
.bigtopic-screen{text-align:center;}
.bigtopic-screen h2{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.55rem;font-weight:400;color:#fff;margin-bottom:4px;}
.bigtopic-screen .sub{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:#334155;font-weight:500;margin-bottom:22px;}
.bigtopic-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:18px;}
.bigtopic-btn{width:100%;font-family:'DM Sans',sans-serif;font-weight:600;padding:20px 22px;border-radius:16px;border:1px solid;cursor:pointer;transition:all 0.2s;text-align:left;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;}
.bigtopic-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 60%);pointer-events:none;}
.bigtopic-btn.fuves{border-color:rgba(34,197,94,.3);background:radial-gradient(ellipse at 30% 50%,rgba(34,197,94,.08),rgba(10,20,14,.9));color:#4ade80;}
.bigtopic-btn.fuves:hover{border-color:rgba(34,197,94,.6);background:radial-gradient(ellipse at 30% 50%,rgba(34,197,94,.15),rgba(10,20,14,.9));transform:translateY(-2px);box-shadow:0 8px 30px rgba(34,197,94,.15);}
.bigtopic-btn.vizek{border-color:rgba(56,189,248,.3);background:radial-gradient(ellipse at 30% 50%,rgba(56,189,248,.08),rgba(5,15,30,.9));color:#7dd3fc;}
.bigtopic-btn.vizek:hover{border-color:rgba(56,189,248,.6);background:radial-gradient(ellipse at 30% 50%,rgba(56,189,248,.15),rgba(5,15,30,.9));transform:translateY(-2px);box-shadow:0 8px 30px rgba(56,189,248,.15);}
.bigtopic-icon{font-size:2.4rem;flex-shrink:0;filter:drop-shadow(0 0 10px currentColor);}
.bigtopic-title{font-size:1rem;font-weight:600;color:#e2e8f0;}
.bigtopic-sub{font-size:.72rem;font-weight:400;color:var(--text-mid);margin-top:3px;letter-spacing:.02em;}
.subtopic-screen h2{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.3rem;font-weight:400;color:#fff;margin-bottom:4px;text-align:center;}
.subtopic-screen.water-theme h2{color:var(--water-light);}
.subtopic-screen .sub{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#334155;font-weight:500;margin-bottom:18px;text-align:center;}
.subtopic-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:16px;}
.subtopic-btn{font-family:'DM Sans',sans-serif;font-weight:500;font-size:.93rem;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);color:#e2e8f0;cursor:pointer;transition:all 0.15s;text-align:left;display:flex;align-items:center;gap:11px;}
.subtopic-btn:hover{background:rgba(124,58,237,.1);border-color:rgba(124,58,237,.3);transform:translateX(4px);}
.subtopic-btn.water-style:hover{background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.3);}
.subtopic-btn .snum{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;color:#475569;min-width:26px;flex-shrink:0;}
.subtopic-btn.water-style .snum{color:#475569;}
.subtopic-btn .sicon{font-size:1.3rem;flex-shrink:0;}
.subtopic-btn .stitle{font-size:.9rem;font-weight:600;}
.subtopic-btn .sstatus{font-size:.68rem;color:var(--text-mid);margin-top:1px;}
.subtopic-btn.locked{opacity:0.35;cursor:not-allowed;}
.subtopic-btn.locked:hover{transform:none;background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.07);}
.coming-badge{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:2px 8px;font-size:.68rem;font-weight:600;margin-left:auto;white-space:nowrap;flex-shrink:0;}
.ready-badge{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:2px 8px;font-size:.68rem;font-weight:600;margin-left:auto;white-space:nowrap;flex-shrink:0;}
.ready-badge.water{background:rgba(56,189,248,.1);color:#7dd3fc;border-color:rgba(56,189,248,.3);}
.mode-screen h2{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.25rem;font-weight:400;color:#fff;margin-bottom:4px;text-align:center;}
.mode-screen.water-theme h2{color:var(--water-light);}
.mode-screen .sub{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#334155;font-weight:500;margin-bottom:18px;text-align:center;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.mode-btn{font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;padding:16px 10px;border-radius:14px;border:1px solid;cursor:pointer;transition:all 0.18s;text-align:center;position:relative;overflow:hidden;background:rgba(20,20,38,.85);}
.mode-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 60%);pointer-events:none;}
.mode-btn .btn-icon{font-size:1.8rem;display:block;margin-bottom:5px;filter:drop-shadow(0 0 8px currentColor);}
.mode-btn .btn-label{display:block;font-size:.88rem;color:#e2e8f0;}
.mode-btn .btn-sub{display:block;font-size:.66rem;font-weight:400;color:var(--text-mid);margin-top:3px;}
.mode-btn.igaz{border-color:rgba(34,197,94,.3);color:#4ade80;}
.mode-btn.igaz:hover{border-color:rgba(34,197,94,.7);background:rgba(34,197,94,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(34,197,94,.15);}
.mode-btn.kviz{border-color:rgba(56,189,248,.3);color:#7dd3fc;}
.mode-btn.kviz:hover{border-color:rgba(56,189,248,.7);background:rgba(56,189,248,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(56,189,248,.15);}
.mode-btn.lyukas{border-color:rgba(245,158,11,.3);color:#fbbf24;}
.mode-btn.lyukas:hover{border-color:rgba(245,158,11,.7);background:rgba(245,158,11,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(245,158,11,.15);}
.mode-btn.sort{border-color:rgba(244,63,94,.3);color:#fb7185;}
.mode-btn.sort:hover{border-color:rgba(244,63,94,.7);background:rgba(244,63,94,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(244,63,94,.15);}
.mode-btn.cat{border-color:rgba(124,58,237,.3);color:#a78bfa;}
.mode-btn.cat:hover{border-color:rgba(124,58,237,.7);background:rgba(124,58,237,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(124,58,237,.15);}
.mode-btn.komp{border-color:rgba(251,191,36,.3);color:#fbbf24;position:relative;overflow:hidden;}
.mode-btn.komp::after{content:'HAMAROSAN';position:absolute;top:6px;right:-18px;background:rgba(251,191,36,.2);color:#fbbf24;font-size:.48rem;font-weight:700;letter-spacing:.08em;padding:2px 22px;transform:rotate(35deg);pointer-events:none;}
.mode-btn.komp:hover{border-color:rgba(251,191,36,.6);background:rgba(251,191,36,.06);transform:translateY(-3px);box-shadow:0 8px 24px rgba(251,191,36,.12);}
.mode-btn.cat:hover{border-color:rgba(124,58,237,.7);background:rgba(124,58,237,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(124,58,237,.15);}
.top-bar{display:flex;align-items:center;gap:7px;margin-bottom:18px;flex-wrap:wrap;}
.q-counter{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.9rem;color:#94a3b8;white-space:nowrap;min-width:60px;}
.back-game-btn{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:600;background:transparent;border:1px solid rgba(255,255,255,.12);color:#475569;border-radius:12px;padding:4px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.back-game-btn:hover{border-color:rgba(244,63,94,.4);color:#fb7185;background:rgba(244,63,94,.07);}
.prog-wrap{flex:1;background:rgba(255,255,255,.06);border-radius:20px;height:4px;overflow:hidden;min-width:50px;}
.prog-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#7c3aed,#22c55e);transition:width 0.5s cubic-bezier(.4,0,.2,1);}
.score-pill{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.88rem;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);border-radius:20px;padding:3px 11px;color:#a78bfa;white-space:nowrap;}
.timer-pill{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.88rem;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.25);border-radius:20px;padding:3px 11px;color:#7dd3fc;white-space:nowrap;}
.pct-pill{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.88rem;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);border-radius:20px;padding:3px 11px;color:#4ade80;white-space:nowrap;transition:all .3s;}
.pct-pill.low{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.25);color:#fb7185;}
.pass-banner{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.4);color:#4ade80;border-radius:14px;padding:14px 18px;font-size:1rem;font-weight:700;margin-bottom:14px;text-align:center;letter-spacing:.01em;}
.fail-banner{background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.35);color:#fb7185;border-radius:14px;padding:14px 18px;font-size:.92rem;font-weight:600;margin-bottom:14px;text-align:center;line-height:1.55;}
.streak-pill{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.88rem;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);border-radius:20px;padding:3px 11px;color:#fbbf24;white-space:nowrap;transition:all .3s;}
.streak-pill.pop{animation:streakPop 0.4s cubic-bezier(.4,0,.2,1);}
@keyframes streakPop{0%{transform:scale(1)}40%{transform:scale(1.45) rotate(-6deg)}70%{transform:scale(0.92) rotate(4deg)}100%{transform:scale(1) rotate(0)}}
.streak-pill.on-fire{background:linear-gradient(90deg,rgba(251,191,36,.2),rgba(239,68,68,.2));border-color:rgba(239,68,68,.5);color:#fca5a5;}
.streak-pill.broken{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.4);color:#fb7185;animation:streakBreak 0.45s ease;}
@keyframes streakBreak{0%{transform:scale(1)}30%{transform:scale(1.12) rotate(8deg)}65%{transform:scale(0.9) rotate(-5deg)}100%{transform:scale(1) rotate(0)}}
.diff-badge{display:inline-block;border-radius:20px;padding:3px 13px;font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;margin-bottom:13px;letter-spacing:.05em;}
.diff-1{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.3);}
.diff-2{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
.diff-3{background:rgba(244,63,94,.1);color:#fb7185;border:1px solid rgba(244,63,94,.3);}
.q-number{font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:500;color:#475569;margin-bottom:5px;letter-spacing:.05em;}
.q-text{font-family:'DM Sans',sans-serif;font-size:1.1rem;font-weight:500;color:#e2e8f0;line-height:1.55;margin-bottom:18px;}
.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:13px;}
.ans-btn{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;padding:15px 10px;border-radius:14px;border:1px solid;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-true{background:rgba(34,197,94,.08);color:#4ade80;border-color:rgba(34,197,94,.3);}
.btn-false{background:rgba(244,63,94,.08);color:#fb7185;border-color:rgba(244,63,94,.3);}
.ans-btn:hover:not(:disabled){transform:translateY(-3px) scale(1.04);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.ans-btn:disabled{cursor:default;opacity:0.7;}
.ans-btn.selected-correct{background:rgba(34,197,94,.2);border-color:#22c55e;box-shadow:0 0 20px rgba(34,197,94,.2);}
.ans-btn.selected-wrong{background:rgba(244,63,94,.2);border-color:#f43f5e;}
.ans-btn.reveal-correct{background:rgba(34,197,94,.15);border-color:#22c55e;}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px;}
.opt-btn{font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;padding:11px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#cbd5e1;cursor:pointer;transition:all 0.15s;text-align:left;line-height:1.4;}
.opt-btn:hover:not(:disabled){background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.4);color:#e2e8f0;}
.opt-btn:disabled{cursor:default;}
.opt-btn.selected-correct{background:rgba(34,197,94,.15);border-color:#22c55e;color:#4ade80;}
.opt-btn.selected-wrong{background:rgba(244,63,94,.15);border-color:#f43f5e;color:#fb7185;}
.opt-btn.reveal-correct{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.5);}
.fill-sentence{font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:400;line-height:2.5;color:#e2e8f0;margin-bottom:15px;background:rgba(255,255,255,.03);border-radius:12px;padding:15px 17px;border:1px solid rgba(255,255,255,.07);}
.fill-select{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:600;padding:4px 9px;border-radius:8px;border:1px solid rgba(124,58,237,.4);background:rgba(124,58,237,.1);color:#a78bfa;cursor:pointer;outline:none;vertical-align:middle;min-width:110px;}
.fill-select:focus{border-color:rgba(124,58,237,.8);}
.fill-select.correct{background:rgba(34,197,94,.15);border-color:#22c55e;color:#4ade80;}
.fill-select.wrong{background:rgba(244,63,94,.15);border-color:#f43f5e;color:#fb7185;}
.fill-select:disabled{cursor:default;}
.fill-hint{font-size:.8rem;color:var(--text-mid);font-weight:400;margin-bottom:13px;font-style:italic;letter-spacing:.02em;}
.feedback{border-radius:12px;padding:12px 15px;font-size:.9rem;font-weight:500;line-height:1.55;margin-bottom:13px;display:none;}
.feedback.show{display:block;animation:feedIn 0.25s ease;}
@keyframes feedIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.feedback.correct{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80;}
.feedback.wrong{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);color:#fb7185;}
.fill-result{border-radius:12px;padding:12px 15px;font-size:.9rem;font-weight:500;line-height:1.55;margin-bottom:13px;display:none;}
.fill-result.show{display:block;animation:feedIn 0.25s ease;}
.fill-result.correct{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80;}
.fill-result.wrong{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);color:#fb7185;}
.fill-result.partial{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:#fbbf24;}
.check-fill-btn{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;padding:11px 32px;background:rgba(124,58,237,.15);color:#a78bfa;border:1px solid rgba(124,58,237,.4);border-radius:25px;cursor:pointer;transition:all 0.15s;display:block;margin:0 auto 13px;}
.check-fill-btn:hover{background:rgba(124,58,237,.25);border-color:rgba(124,58,237,.7);transform:translateY(-2px);}
.check-fill-btn:disabled{opacity:0.4;cursor:default;transform:none;}
.sort-intro{font-size:.8rem;color:var(--text-mid);font-weight:400;margin-bottom:14px;font-style:italic;background:rgba(255,255,255,.03);border-radius:10px;padding:9px 13px;border:1px solid rgba(255,255,255,.07);letter-spacing:.02em;}
.sort-list{display:flex;flex-direction:column;gap:8px;margin-bottom:15px;min-height:40px;}
.sort-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:12px 15px;font-family:'DM Sans',sans-serif;font-size:.93rem;font-weight:500;color:#e2e8f0;cursor:grab;user-select:none;display:flex;align-items:center;gap:10px;transition:all 0.15s;touch-action:none;}
.sort-item:active{cursor:grabbing;}
.sort-item.dragging{opacity:0.4;transform:scale(1.03);border-color:rgba(124,58,237,.5);}
.sort-item.drag-over{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.5);}
.sort-item.correct-item{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4);color:#4ade80;}
.sort-item.wrong-item{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.4);color:#fb7185;}
.sort-handle{font-size:1rem;opacity:0.3;flex-shrink:0;}
.sort-num{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.95rem;color:#475569;min-width:22px;flex-shrink:0;}
.sort-check-btn{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;padding:11px 32px;background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.35);border-radius:25px;cursor:pointer;transition:all 0.15s;display:block;margin:0 auto 13px;}
.sort-check-btn:hover{background:rgba(34,197,94,.22);border-color:rgba(34,197,94,.6);transform:translateY(-2px);}
.sort-check-btn:disabled{opacity:0.4;cursor:default;transform:none;}

/* ===== TÉMA-ALAPÚ VIZUÁLIS RENDSZER ===== */
body { transition: background 1.2s cubic-bezier(.4,0,.2,1); }

/* FÜVES */
body.theme-fuves { background: radial-gradient(ellipse 120% 80% at 50% 100%, rgba(20,60,20,.95) 0%, #0a1a0e 55%, #10141a 100%); }
body.theme-fuves .bg-deco::before { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(34,197,94,.18) 0%, transparent 70%); }
body.theme-fuves .bg-deco::after { background: radial-gradient(ellipse at 50% 100%, rgba(34,197,94,.16) 0%, rgba(251,191,36,.07) 40%, transparent 70%); }
body.theme-fuves .card { border-color: rgba(34,197,94,.25) !important; box-shadow: 0 0 0 1px rgba(34,197,94,.15), 0 20px 60px rgba(0,0,0,.6), inset 0 1px 0 rgba(34,197,94,.10) !important; }
body.theme-fuves .prog-fill { background: linear-gradient(90deg, #22c55e, #fbbf24); }

/* VIZEK */
body.theme-vizek { background: radial-gradient(ellipse 120% 80% at 50% 100%, rgba(5,30,60,.98) 0%, #030d1e 55%, #0a0f18 100%); }
body.theme-vizek .bg-deco::before { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(56,189,248,.18) 0%, transparent 70%); }
body.theme-vizek .bg-deco::after { background: radial-gradient(ellipse at 50% 100%, rgba(56,189,248,.18) 0%, rgba(14,165,233,.07) 40%, transparent 70%); }
body.theme-vizek .card { border-color: rgba(56,189,248,.25) !important; box-shadow: 0 0 0 1px rgba(56,189,248,.15), 0 20px 60px rgba(0,0,0,.6), inset 0 1px 0 rgba(56,189,248,.10) !important; }
body.theme-vizek .prog-fill { background: linear-gradient(90deg, #0ea5e9, #7dd3fc); }

/* ERDŐ */
body.theme-erdo { background: radial-gradient(ellipse 120% 80% at 50% 100%, rgba(10,35,10,.98) 0%, #060f06 55%, #0c1210 100%); }
body.theme-erdo .bg-deco::before { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(20,160,80,.16) 0%, transparent 70%); }
body.theme-erdo .bg-deco::after { background: radial-gradient(ellipse at 50% 100%, rgba(20,160,80,.14) 0%, rgba(139,90,43,.08) 40%, transparent 70%); }
body.theme-erdo .card { border-color: rgba(20,160,80,.28) !important; box-shadow: 0 0 0 1px rgba(20,160,80,.16), 0 20px 60px rgba(0,0,0,.65), inset 0 1px 0 rgba(20,160,80,.10) !important; }
body.theme-erdo .prog-fill { background: linear-gradient(90deg, #14a050, #a3e635); }

/* KÖLCSÖNHATÁSOK */
body.theme-kolcson { background: radial-gradient(ellipse 120% 80% at 50% 100%, rgba(60,30,5,.98) 0%, #1a0e03 55%, #141008 100%); }
body.theme-kolcson .bg-deco::before { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(245,158,11,.16) 0%, transparent 70%); }
body.theme-kolcson .bg-deco::after { background: radial-gradient(ellipse at 50% 100%, rgba(245,158,11,.14) 0%, rgba(239,68,68,.06) 40%, transparent 70%); }
body.theme-kolcson .card { border-color: rgba(245,158,11,.28) !important; box-shadow: 0 0 0 1px rgba(245,158,11,.16), 0 20px 60px rgba(0,0,0,.65), inset 0 1px 0 rgba(245,158,11,.10) !important; }
body.theme-kolcson .prog-fill { background: linear-gradient(90deg, #f59e0b, #ef4444); }

/* FÖLD */
body.theme-fold { background: radial-gradient(ellipse 120% 80% at 50% 100%, rgba(5,20,50,.98) 0%, #030a1a 55%, #080c18 100%); }
body.theme-fold .bg-deco::before { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(99,102,241,.18) 0%, transparent 70%); }
body.theme-fold .bg-deco::after { background: radial-gradient(ellipse at 50% 100%, rgba(99,102,241,.14) 0%, rgba(56,189,248,.06) 40%, transparent 70%); }
body.theme-fold .card { border-color: rgba(99,102,241,.28) !important; box-shadow: 0 0 0 1px rgba(99,102,241,.16), 0 20px 60px rgba(0,0,0,.65), inset 0 1px 0 rgba(99,102,241,.10) !important; }
body.theme-fold .prog-fill { background: linear-gradient(90deg, #6366f1, #38bdf8); }

/* TERMÉSZET ERŐI */
body.theme-termeszet { background: radial-gradient(ellipse 120% 80% at 50% 100%, rgba(50,10,10,.98) 0%, #180505 55%, #120808 100%); }
body.theme-termeszet .bg-deco::before { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(220,38,38,.18) 0%, transparent 70%); }
body.theme-termeszet .bg-deco::after { background: radial-gradient(ellipse at 50% 100%, rgba(220,38,38,.14) 0%, rgba(245,158,11,.07) 40%, transparent 70%); }
body.theme-termeszet .card { border-color: rgba(220,38,38,.28) !important; box-shadow: 0 0 0 1px rgba(220,38,38,.16), 0 20px 60px rgba(0,0,0,.65), inset 0 1px 0 rgba(220,38,38,.10) !important; }
body.theme-termeszet .prog-fill { background: linear-gradient(90deg, #dc2626, #f59e0b); }

/* Emoji deco */
.bg-emoji-deco { position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden; }
.bg-emoji-deco span { position:absolute;font-size:1.6rem;opacity:0;animation:emojiFloat linear infinite;user-select:none;pointer-events:none; }
@keyframes emojiFloat { 0%{transform:translateY(110vh) rotate(0deg) scale(0.6);opacity:0} 8%{opacity:0.12} 88%{opacity:0.07} 100%{transform:translateY(-12vh) rotate(360deg) scale(1.1);opacity:0} }
.particle.tp { border-radius:2px 50% 2px 50%; }
.particle.tp-w { border-radius:50% 50% 50% 0; }
.particle.tp-r { border-radius:3px; }

        tf:[
          {text:"A gyökér a növény föld alatti része.",answer:true,diff:1,explain:"Igen! A gyökér a talajban van — rögzíti a növényt és vizet, tápanyagot szív fel."},
          {text:"A levél a növény szaporodásra szolgáló része.",answer:false,diff:1,explain:"Nem! A szaporodásra a virág szolgál. A levél a fotoszintézis helye."},
          {text:"A fotoszintézis a levélben megy végbe.",answer:true,diff:1,explain:"Igen! A levél a növény »konyhája« — itt készül a táplálék napfény segítségével."},
          {text:"A fás szárú növények szára puha és hajlékony.",answer:false,diff:1,explain:"Nem! A fás szárú növények (pl. fák, bokrok) szára kemény és fás. A lágyszárúak szára puha."},
          {text:"A termés a virágból fejlődik ki.",answer:true,diff:1,explain:"Pontosan! A virág beporzás után termést fejleszt, ami a magokat védi és terjeszti."},
          {text:"A kultúrnövényeket az ember termeszti a saját hasznára.",answer:true,diff:1,explain:"Igen! Például a búza, a kukorica, a paradicsom és az alma mind kultúrnövény."},
          {text:"A gyökér feladata kizárólag a növény rögzítése.",answer:false,diff:2,explain:"Nem egészen! A gyökér egyszerre rögzíti a növényt ÉS felszívja a vizet és a tápanyagokat."},
          {text:"A virág azért színes és illatos, hogy vonzza a beporzást végző rovarokat.",answer:true,diff:2,explain:"Igen! A rovarok a nektárért jönnek, közben pollent visznek egyik virágból a másikba."},
          {text:"A szár csak tartja a leveleket, de nem szállít anyagokat.",answer:false,diff:2,explain:"Nem! A szár szállítja is a vizet és a tápanyagokat a gyökértől a levelekig és vissza."},
          {text:"A lágyszárú növények szára idővel elfásodik.",answer:false,diff:2,explain:"Nem! A lágyszárú növények szára puha marad. Az elfásodás a fás szárúakra jellemző."},
          {text:"A zöldség és a gyümölcs is kultúrnövény lehet.",answer:true,diff:2,explain:"Igen! Például a paradicsom (zöldség) és az alma (gyümölcs) is kultúrnövény — az ember termeszti."},

function getProgress(){try{return JSON.parse(localStorage.getItem('termeszet_progress')||'{}');}catch(e){return{};}}
function saveProgress(bigId,subtopicId,pct){var prog=getProgress();if(!prog[bigId])prog[bigId]={};if(!prog[bigId][subtopicId]||pct>(prog[bigId][subtopicId].pct||0)){prog[bigId][subtopicId]={passed:pct>=70,pct:pct};}localStorage.setItem('termeszet_progress',JSON.stringify(prog));}
function isSubtopicUnlocked(bigId,subtopicId){if(subtopicId<=1)return true;var prog=getProgress();var prev=prog[bigId]&&prog[bigId][subtopicId-1];return !!(prev&&prev.passed);}
function getLog(){try{return JSON.parse(localStorage.getItem('termeszet_log')||'[]');}catch(e){return[];}}
function appendLog(entry){var log=getLog();log.push(entry);localStorage.setItem('termeszet_log',JSON.stringify(log));}

function formatTime(s){const m=Math.floor(s/60),sec=s%60;return(m>0?m+' perc ':'')+sec+' mp';}
function streakLabel(){if(streak===0)return'🔥 0';if(streak>=5)return'🔥🔥 '+streak+'!!!';if(streak>=3)return'🔥 '+streak+'!';return'🔥 '+streak;}
function diffLabel(d){if(d===1)return['diff-1','🟢 Könnyű'];if(d===2)return['diff-2','🟡 Közepes'];return['diff-3','🔴 Nehéz'];}
function starsStr(sc,total){const p=sc/total;if(p>=0.9)return'⭐⭐⭐';if(p>=0.65)return'⭐⭐';return'⭐';}

function initPetuniaSpin(sceneId, btId){
  const scene=document.getElementById(sceneId);
  const flower=scene?scene.querySelector('.petunia3d'):null;
  if(!flower)return;
  let rotX=-18,rotY=22,autoSpin=true,raf=null,lastT=null;
  let dragging=false,moved=false,prev={x:0,y:0},vel={x:0,y:0};
  function applyRot(){flower.style.transform='rotateX('+rotX+'deg) rotateY('+rotY+'deg)';}
  function onStart(x,y){dragging=true;moved=false;autoSpin=false;prev={x,y};vel={x:0,y:0};cancelAnimationFrame(raf);lastT=null;}
  function onMove(x,y){
    if(!dragging)return;
    const dx=x-prev.x,dy=y-prev.y;
    if(Math.abs(dx)>2||Math.abs(dy)>2)moved=true;
    rotY+=dx*.5;rotX-=dy*.5;rotX=Math.max(-80,Math.min(80,rotX));vel={x:-dy*.4,y:dx*.4};prev={x,y};applyRot();
  }
  function onEnd(){
    if(!dragging)return;dragging=false;
    if(!moved){triggerCubeRoll(btId);return;}
    (function mom(){vel.x*=.92;vel.y*=.92;rotX+=vel.x;rotY+=vel.y;rotX=Math.max(-80,Math.min(80,rotX));applyRot();
      if(Math.abs(vel.x)>.05||Math.abs(vel.y)>.05)raf=requestAnimationFrame(mom);
      else{autoSpin=true;requestAnimationFrame(spin);}})();
  }
  scene.addEventListener('mousedown',e=>{e.preventDefault();onStart(e.clientX,e.clientY);});
  window.addEventListener('mousemove',e=>{if(dragging)onMove(e.clientX,e.clientY);});
  window.addEventListener('mouseup',()=>{if(dragging)onEnd();});
  scene.addEventListener('touchstart',e=>onStart(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
  window.addEventListener('touchmove',e=>{if(dragging)onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  window.addEventListener('touchend',()=>{if(dragging)onEnd();},{passive:true});
  function spin(ts){if(!autoSpin||dragging){lastT=null;return;}if(!lastT)lastT=ts;const dt=ts-lastT;lastT=ts;rotY+=dt*.016;rotX+=dt*.003;applyRot();raf=requestAnimationFrame(spin);}
  setTimeout(()=>{if(autoSpin)requestAnimationFrame(spin);},100);
}

function makeCubeFaces(colorClass, bt){
  const subs=bt.subtopics;
  const total=subs.length;
  const faceData=[];
  for(let i=0;i<6;i++){
    if(i<subs.length){faceData.push({icon:subs[i].icon,title:subs[i].title,num:(i+1)+'/'+total,ready:subs[i].ready});}
    else{faceData.push({icon:bt.icon,title:bt.title,num:total+' altéma',ready:false});}
  }
  const faces=['cf-front','cf-back','cf-right','cf-left','cf-top','cf-bot'];
  return faces.map(function(pos,i){
    const d=faceData[i];
    return '<div class="cface '+pos+'">'+
      '<div class="'+colorClass+' cface-fill">'+
        '<div class="cbr tl"></div><div class="cbr tr"></div>'+
        '<div class="cbr bl"></div><div class="cbr br"></div>'+
        '<div class="cface-inner">'+
          '<div class="cface-num">'+d.num+'</div>'+
          '<div class="cface-icon">'+d.icon+'</div>'+
          '<div class="cface-title">'+d.title.substring(0,32)+(d.title.length>32?'…':'')+'</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function initDualCubeSpin(cubeId,sceneId,mirror){
  const cube=document.getElementById(cubeId);
  const scene=document.getElementById(sceneId);
  if(!cube||!scene)return;
  let rotX=-18,rotY=mirror?-22:22,autoSpin=true,raf=null,lastT=null;
  const dir=mirror?-1:1;
  let dragging=false,moved=false,prev={x:0,y:0},vel={x:0,y:0};
  function applyRot(){cube.style.transform='rotateX('+rotX+'deg) rotateY('+rotY+'deg)';}
  cube.addEventListener('animationend',function(){
    if(!cube.classList.contains('rolling-left')&&!cube.classList.contains('rolling-right')){cube.style.animation='none';applyRot();}
  });
  function onStart(x,y){dragging=true;moved=false;autoSpin=false;prev={x:x,y:y};vel={x:0,y:0};cancelAnimationFrame(raf);lastT=null;}
  function onMove(x,y){
    if(!dragging)return;
    const dx=x-prev.x,dy=y-prev.y;
    if(Math.abs(dx)>2||Math.abs(dy)>2)moved=true;
    rotY+=dx*.5;rotX-=dy*.5;rotX=Math.max(-80,Math.min(80,rotX));vel={x:-dy*.4,y:dx*.4};prev={x:x,y:y};applyRot();
  }
  function onEnd(){
    if(!dragging)return;dragging=false;
    if(!moved){const btId=cubeId.replace('cube3d_','');triggerCubeRoll(btId);return;}
    (function mom(){vel.x*=.92;vel.y*=.92;rotX+=vel.x;rotY+=vel.y;rotX=Math.max(-80,Math.min(80,rotX));applyRot();if(Math.abs(vel.x)>.05||Math.abs(vel.y)>.05)raf=requestAnimationFrame(mom);else{autoSpin=true;requestAnimationFrame(spin);}})();
  }
  scene.addEventListener('mousedown',function(e){e.preventDefault();onStart(e.clientX,e.clientY);});
  window.addEventListener('mousemove',function(e){if(dragging)onMove(e.clientX,e.clientY);});
  window.addEventListener('mouseup',function(){if(dragging)onEnd();});
  scene.addEventListener('touchstart',function(e){onStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  window.addEventListener('touchmove',function(e){if(dragging)onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  window.addEventListener('touchend',function(){if(dragging)onEnd();},{passive:true});
  function spin(ts){if(!autoSpin||dragging){lastT=null;return;}if(!lastT)lastT=ts;const dt=ts-lastT;lastT=ts;rotY+=dt*.016*dir;rotX+=dt*.003;applyRot();raf=requestAnimationFrame(spin);}

function triggerCubeRoll(btId){
  const bt=BIG_TOPICS.find(function(b){return b.id===btId;});
  if(!bt)return;
  const cubeEl=document.getElementById('cube3d_'+btId);
  if(!cubeEl||cubeEl.classList.contains('rolling-left')||cubeEl.classList.contains('rolling-right'))return;
  const idx=BIG_TOPICS.indexOf(bt);
  const rollClass=(idx%2===0)?'rolling-left':'rolling-right';
  cubeEl.classList.add(rollClass);
  setTimeout(function(){triggerExplosion(btId,bt);},500);
  setTimeout(function(){showSubtopicsInline(bt);},900);
}

function triggerExplosion(btId,bt){
  const th=CUBE_THEME[btId]||CUBE_THEME.fuves;
  const color=th.color;
  const flash=document.createElement('div');
  flash.className='exp-flash';
  flash.style.background=th.flash;
  document.body.appendChild(flash);
  setTimeout(function(){flash.remove();},400);
  const expC=document.createElement('div');
  expC.className='explosion-container';
  const idx=BIG_TOPICS.findIndex(function(b){return b.id===btId;});
  const totalCols=3;
  const col=idx%totalCols;
  expC.style.left=((col*33)+16)+'%';
  expC.style.top='100px';
  const dc=document.getElementById('dualCubes');
  if(!dc)return;
  dc.appendChild(expC);
  const r1=document.createElement('div');r1.className='exp-ring';r1.style.borderColor=color;expC.appendChild(r1);
  const r2=document.createElement('div');r2.className='exp-ring2';r2.style.borderColor=color;expC.appendChild(r2);
  for(let i=0;i<14;i++){

function shuffleArray(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
let shuffledQuestions=[];
function startGame(m){
  mode=m;current=0;score=0;streak=0;bestStreak=0;answered=false;
  startTime=Date.now();elapsedSeconds=0;
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(updateTimer,1000);
  const raw=mode==='tf'?currentTopic.tf:mode==='quiz'?currentTopic.quiz:mode==='fill'?currentTopic.fill:mode==='sort'?currentTopic.sort:currentTopic.cat;
  shuffledQuestions=shuffleArray(raw);
  render();
}

function showKompetenciaPlaceholder(){
  document.getElementById('gameArea').innerHTML=
    '<div class="card" style="text-align:center;padding:40px 24px;">'+
      '<div style="font-size:3.5rem;margin-bottom:14px;">🎯</div>'+
      '<h2 style="font-family:'DM Serif Display',serif;font-style:italic;font-size:1.6rem;color:#fbbf24;margin-bottom:10px;">Kompetencia mód</h2>'+
      '<p style="color:#94a3b8;font-size:.95rem;line-height:1.6;margin-bottom:28px;">Ez a játékmód fejlesztés alatt áll.<br>Hamarosan elérhető lesz!</p>'+
      '<button class="back-btn" style="margin:0 auto;display:block;" onclick="showModes(currentTopic.id)">← Vissza a játékmódokhoz</button>'+
    '</div>';
}

function backToModes(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  score=0;streak=0;bestStreak=0;current=0;answered=false;
  showModes(currentTopic.id);
}

function render(){
  const area=document.getElementById('gameArea');
  const questions=shuffledQuestions.length?shuffledQuestions:(mode==='tf'?currentTopic.tf:mode==='quiz'?currentTopic.quiz:mode==='fill'?currentTopic.fill:mode==='sort'?currentTopic.sort:currentTopic.cat);
  const total=questions.length;
  if(current>=total){
    if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
    const pct=Math.round(score/total*100);
    let emoji,title,sub;
    if(pct>=90){emoji='🏆';title='Mester szint!';sub='Szinte tökéletes — gratulálunk, '+playerName+'!';}
    else if(pct>=70){emoji='🌟';title='Nagyszerű munka!';sub='Nagyon jól ismered az anyagot!';}
    else if(pct>=50){emoji='🌱';title='Jó kezdet!';sub='Nézd át újra és biztosan jobban megy!';}
    else{emoji='🌾';title='Még gyakorolni kell!';sub='Olvasd el a tananyagot és próbáld újra!';}
    const modeLabel=mode==='tf'?'Igaz/Hamis':mode==='quiz'?'Kvíz':mode==='fill'?'Lyukas szöveg':mode==='sort'?'Sorrendbe állítás':'Kategorizálás';
    saveProgress(currentBigTopic.id,currentTopic.id,pct);
    const passed=pct>=70;
    const nextTopic=currentBigTopic.subtopics.find(function(t){return t.id===currentTopic.id+1&&t.ready;});
    const passBanner=passed?
      '<div class="pass-banner">✅ Továbbléphet a következő altémára! ('+pct+'%)</div>':
      '<div class="fail-banner">❌ Eredmény: <strong>'+pct+'%</strong><br>A továbbhaladáshoz <strong>70%</strong> szükséges. Próbáld újra!</div>';
    const nextTopicBtn=(passed&&nextTopic)?
      '<button class="rbtn green" onclick="subtopicSelected('+nextTopic.id+')">➡️ Következő altéma</button>':'';
    area.innerHTML=
      '<div class="card result-screen">'+
        '<span class="result-emoji">'+emoji+'</span>'+
        '<div class="stars">'+starsStr(score,total)+'</div>'+
        '<div class="result-title">'+title+'</div>'+
        '<div class="result-sub">'+sub+'</div>'+
        '<div class="result-grid">'+
          '<div class="stat-box"><div class="stat-num">'+score+' / '+total+'</div><div class="stat-lbl">✅ Helyes</div></div>'+
          '<div class="stat-box"><div class="stat-num" style="color:'+(passed?'#4ade80':'#fb7185')+'">'+pct+'%</div><div class="stat-lbl">📊 Arány</div></div>'+
          '<div class="stat-box time-stat"><div class="stat-num">'+formatTime(elapsedSeconds)+'</div><div class="stat-lbl">⏱ Idő</div></div>'+
          '<div class="stat-box streak-stat"><div class="stat-num">'+bestStreak+'</div><div class="stat-lbl">🔥 Legjobb sorozat</div></div>'+
        '</div>'+
        passBanner+
        '<div class="saving-msg" id="savingMsg">⏳ Eredmény mentése...</div>'+
        '<div class="result-btns">'+
          nextTopicBtn+
          '<button class="rbtn orange" onclick="startGame(\''+mode+'\')">🔄 Újra</button>'+
          '<button class="rbtn green" onclick="showModes('+currentTopic.id+')">📚 Módok</button>'+
          '<button class="rbtn blue" onclick="showBigTopics()">🏠 Főmenü</button>'+
        '</div>'+
      '</div>';
    saveResult(playerName,currentBigTopic.title,currentTopic.title,modeLabel,score,total,elapsedSeconds,bestStreak);
    return;
  }
  const q=questions[current];
  const[dClass,dLabel]=diffLabel(q.diff);
  const prog=Math.round((current/total)*100);
  const onFire=streak>=3;
  const nextLabel=current+1<total?'Következő ➡️':'Eredmény 🏆';
  const topBar=
    '<div class="top-bar">'+
      '<button class="back-game-btn" onclick="backToModes()">← Módok</button>'+
      '<div class="q-counter">'+(current+1)+' / '+total+'</div>'+
      '<div class="prog-wrap"><div class="prog-fill" style="width:'+prog+'%"></div></div>'+
      '<div class="score-pill">🌟 '+score+'</div>'+
      (current>0?'<div class="pct-pill'+(Math.round(score/current*100)<70?' low':'')+'" id="pctPill">'+Math.round(score/current*100)+'%</div>':'')+
      '<div class="streak-pill '+(onFire?'on-fire':'')+'" id="streakPill">'+streakLabel()+'</div>'+
      '<div class="timer-pill" id="timerPill">⏱ '+formatTime(elapsedSeconds)+'</div>'+
      (currentTopic&&currentTopic.tananyag?'<button class="back-game-btn tananyag-game-btn" onclick="openTananyag()" title="Tananyag">📖</button>':'')+
    '</div>';
  if(mode==='fill'){renderFill(area,q,topBar,dClass,dLabel,nextLabel);}
  else if(mode==='sort'){renderSort(area,q,topBar,dClass,dLabel,nextLabel);}
  else if(mode==='cat'){renderCat(area,q,topBar,dClass,dLabel,nextLabel);}
  else{
    let ansHTML='';
    if(mode==='tf'){
      ansHTML='<div class="tf-row"><button class="ans-btn btn-true" id="btnTrue" onclick="answerTF(true)">✅ IGAZ</button><button class="ans-btn btn-false" id="btnFalse" onclick="answerTF(false)">❌ HAMIS</button></div>';
    } else {
      ansHTML='<div class="opts-grid">';
      q.opts.forEach(function(o,i){ansHTML+='<button class="opt-btn" id="opt'+i+'" onclick="answerQuiz('+i+')">'+o+'</button>';});
      ansHTML+='</div>';
    }
    area.innerHTML=topBar+'<div class="card"><div class="q-number">📋 '+(current+1)+'. kérdés — '+playerName+'</div><span clext">'+q.text+'</div>'+ansHTML+'<div class="feedback" id="feedback"></div><button class="next-btn" id="nextBtn" onclick="next()">'+nextLabel+'</button></div>';
    answered=false;
  }
}

function renderFill(area,q,topBar,dClass,dLabel,nextLabel){
  let sentenceHTML='<div class="fill-sentence">';
  q.parts.forEach(function(part){
    if(typeof part==='string'){sentenceHTML+=part;}
    else{
      const gap=q.gaps.find(function(g){return g.id===part.id;});
      const shuffled=[...gap.options].sort(function(){return Math.random()-0.5;});
      sentenceHTML+='<select class="fill-select" id="gap'+gap.id+'"><option value="">— válassz —</option>';
      shuffled.forEach(function(opt){sentenceHTML+='<option value="'+opt+'">'+opt+'</option>';});
      sentenceHTML+='</select>';
    }
  });
  sentenceHTML+='</div>';
  area.innerHTML=topBar+'<div class="card"><div class="q-number">✏️ '+(current+1)+'. mondat — '+playerName+'</div><p class="fill-hint">Válaszd ki a legördülő menüből a megfelelő szót!</p>'+sentenceHTML+'<div class="fill-result" id="fillResult"></div><button class="check-fill-btn" id="checkBtn" onclick="checkFill()">✅ Ellenőrzés</button><button class="next-btn" id="nextBtn" onclick="next()">'+nextLabel+'</button></div>';
  answered=false;
}

function checkFill(){
  if(answered)return;
  const questions=shuffledQuestions.length?shuffledQuestions:currentTopic.fill;
  const q=questions[current];
  let allCorrect=true,anyEmpty=false;
  q.gaps.forEach(function(gap){
    const sel=document.getElementById('gap'+gap.id);
    if(!sel.value)anyEmpty=true;
    else if(sel.value!==gap.correct)allCorrect=false;
  });
  if(anyEmpty){const res=document.getElementById('fillResult');res.className='fill-result show partial';res.textContent='⚠️ Kérlek töltsd ki az összes üres helyet!';return;}
  answered=true;document.getElementById('checkBtn').disabled=true;
  q.gaps.forEach(function(gap){const sel=document.getElementById('gap'+gap.id);sel.disabled=true;sel.classList.add(sel.value===gap.correct?'correct':'wrong');});
  if(allCorrect){score++;streak++;if(streak>bestStreak)bestStreak=streak;}else{streak=0;}
  const pill=document.getElementById('streakPill');
  if(pill){pill.textContent=streakLabel();pill.className='streak-pill';void pill.offsetWidth;if(!allCorrect)pill.classList.add('broken');else{if(streak>=3)pill.classList.add('on-fire');pill.classList.add('pop');}}
  let correctText='A helyes válasz: ';
  q.gaps.forEach(function(gap,i){if(i>0)correctText+=', ';correctText+='"'+gap.correct+'"';});
  const res=document.getElementById('fillResult');
  if(allCorrect){let prefix='✅ Helyes! ';if(streak>=5)prefix='🔥🔥 '+streak+' sorozat! ';else if(streak>=3)prefix='🔥 '+streak+' sorozat! ';res.className='fill-result show correct';res.textContent=prefix+'Minden szót jól választottál!';}
  else{res.className='fill-result show wrong';res.textContent='❌ Nem egészen. '+correctText;}
  document.getElementById('nextBtn').classList.add('show');
}

function handleResult(correct,explain){
  if(correct){score++;streak++;if(streak>bestStreak)bestStreak=streak;}else streak=0;
  const pill=document.getElementById('streakPill');
  if(pill){pill.textContent=streakLabel();pill.className='streak-pill';void pill.offsetWidth;if(!correct)pill.classList.add('broken');else{if(streak>=3)pill.classList.add('on-fire');pill.classList.add('pop');}}
  const fb=document.getElementById('feedback');
  let prefix=correct?'✅ Helyes! ':'❌ Nem egészen. ';
  if(correct&&streak>=5)prefix='🔥🔥 '+streak+' egymás utáni helyes! ';
  else if(correct&&streak>=3)prefix='🔥 '+streak+' sorozat! ';
  fb.className='feedback show '+(correct?'correct':'wrong');fb.textContent=prefix+explain;
  document.getElementById('nextBtn').classList.add('show');
}

function answerTF(choice){
  if(answered)return;answered=true;
  const questions=shuffledQuestions.length?shuffledQuestions:currentTopic.tf;
  const q=questions[current];const correct=choice===q.answer;
  const bT=document.getElementById('btnTrue'),bF=document.getElementById('btnFalse');
  bT.disabled=true;bF.disabled=true;
  const chosen=choice?bT:bF;
  if(correct)chosen.classList.add('selected-correct');
  else{chosen.classList.add('selected-wrong');(q.answer?bT:bF).classList.add('reveal-correct');}
  handleResult(correct,q.explain);
}

function answerQuiz(i){
  if(answered)return;answered=true;
  const questions=shuffledQuestions.length?shuffledQuestions:currentTopic.quiz;
  const q=questions[current];const correct=i===q.correct;
  for(let j=0;j<q.opts.length;j++){
    const btn=document.getElementById('opt'+j);btn.disabled=true;
    if(j===i&&correct)btn.classList.add('selected-correct');
    else if(j===i&&!correct)btn.classList.add('selected-wrong');
    else if(j===q.correct)btn.classList.add('reveal-correct');
  }
  handleResult(correct,q.explain);
}

function next(){current++;render();window.scrollTo({top:0,behavior:'smooth'});}

function saveResult(name,bigTopic,subTopic,modeLabel,score,total,time,bestStreak){
  const pctVal=Math.round(score/total*100);
  const now=new Date();
  const dateStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  const timeStr=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const entry={name:name,date:dateStr,clockTime:timeStr,timestamp:now.getTime(),bigTopic:bigTopic,subTopic:subTopic,mode:modeLabel,score:score,total:total,pct:pctVal,passed:pctVal>=70,timeSeconds:time,bestStreak:bestStreak};
  appendLog(entry);
  fetch(SHEET_URL,{
    method:'POST',headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({name:name,date:dateStr,ora:timeStr,nagytema:bigTopic,altema:subTopic,mod:modeLabel,helyes:score,osszes:total,pct:pctVal,teljesitett:pctVal>=70?'Igen':'Nem',ido_mp:time,ido:formatTime(time),bestStreak:bestStreak})
  })
  .then(function(r){return r.json();})
  .then(function(){const msg=document.getElementById('savingMsg');if(msg){msg.textContent='✅ Eredmény elmentve!';msg.className='saving-msg ok';}})
  .catch(function(){const msg=document.getElementById('savingMsg');if(msg){msg.textContent='⚠️ Mentés nem sikerült.';msg.className='saving-msg err';}});
}



function renderSort(area,q,topBar,dClass,dLabel,nextLabel){
  const shuffled=q.items.map(function(text,i){return{text:text,origIdx:i};});
  for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
  let itemsHTML='';
  shuffled.forEach(function(item,i){
    itemsHTML+='<div class="sort-item" data-idx="'+i+'" data-orig="'+item.origIdx+'">'+
      '<span class="sort-handle">☰</span><span class="sort-num">'+(i+1)+'.</span><span>'+item.text+'</span></div>';
  });
  area.innerHTML=topBar+
    '<div class="card">'+
      '<div class="q-number">🔢 '+(current+1)+'. feladat — '+playerName+'</div>'+
      ''+
      '<div class="q-text">'+q.question+'</div>'+
      '<div class="sort-intro">💡 Húzd a sorokat a helyes sorrendbe!</div>'+
      '<div class="sort-list" id="sortList">'+itemsHTML+'</div>'+
      '<div class="sort-result" id="sortResult"></div>'+
      '<button class="sort-check-btn" id="sortCheckBtn" onclick="checkSort()">✅ Ellenőrzés</button>'+
      '<button class="next-btn" id="nextBtn" onclick="next()">'+nextLabel+'</button>'+
    '</div>';
  answered=false;
  updateSortNumbers();
  initSortDrag();
}

function updateSortNumbers(){document.querySelectorAll('.sort-item').forEach(function(el,i){el.querySelector('.sort-num').textContent=(i+1)+'.';});}

function initSortDrag(){
  const list=document.getElementById('sortList');
  if(!list)return;
  let dragEl=null,ghost=null,startY=0,startX=0,origRect=null,placeholder=null;

  function getItems(){return [...list.querySelectorAll('.sort-item')];}

  function createGhost(el,cx,cy){
    const r=el.getBoundingClientRect();
    ghost=el.cloneNode(true);
    ghost.style.cssText='position:fixed;z-index:9999;left:'+(r.left)+'px;top:'+(r.top)+'px;width:'+r.width+'px;opacity:0.85;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5);transform:scale(1.03);transition:none;background:rgba(124,58,237,.18);border:1px solid rgba(124,58,237,.6);border-radius:12px;';
    document.body.appendChild(ghost);
    startX=cx-r.left;startY=cy-r.top;
  }

  function moveGhost(cx,cy){
    if(!ghost)return;
    ghost.style.left=(cx-startX)+'px';
    ghost.style.top=(cy-startY)+'px';
  }

  function getTargetEl(cy){
    const items=getItems().filter(function(el){return el!==dragEl&&el!==placeholder;});
    for(let i=0;i<items.length;i++){
      const r=items[i].getBoundingClientRect();
      if(cy<r.top+r.height/2)return{el:items[i],before:true};
    }
    return{el:items[items.length-1]||null,before:false};
  }

  function onStart(el,cx,cy){
    if(answered)return;
    dragEl=el;
    origRect=el.getBoundingClientRect();
    placeholder=document.createElement('div');
    placeholder.className='sort-item';
    placeholder.style.cssText='opacity:0.25;border:1px dashed rgba(124,58,237,.4);background:rgba(124,58,237,.05);';
    placeholder.style.height=origRect.height+'px';
    list.insertBefore(placeholder,dragEl.nextSibling);
    dragEl.classList.add('dragging');
    createGhost(el,cx,cy);
  }

  function onMove(cx,cy){
    if(!dragEl)return;
    moveGhost(cx,cy);
    const t=getTargetEl(cy);
    if(t.el){
      if(t.before)list.insertBefore(placeholder,t.el);
      else list.insertBefore(placeholder,t.el.nextSibling);
    }
    getItems().forEach(function(el){el.classList.remove('drag-over');});
    const t2=getTargetEl(cy);
    if(t2.el)t2.el.classList.add('drag-over');
  }

  function onEnd(){
    if(!dragEl)return;
    dragEl.classList.remove('dragging');
    getItems().forEach(function(el){el.classList.remove('drag-over');});
    if(placeholder&&placeholder.parentNode){
      list.insertBefore(dragEl,placeholder);
      placeholder.remove();
    }
    if(ghost){ghost.remove();ghost=null;}
    dragEl=null;placeholder=null;
    updateSortNumbers();
  }

  function handleMouseMove(e){if(dragEl)onMove(e.clientX,e.clientY);}
  function handleMouseUp(){if(dragEl)onEnd();}
  function handleTouchMove(e){if(dragEl){e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);}}
  function handleTouchEnd(){if(dragEl)onEnd();}

  list.addEventListener('mousedown',function(e){
    const item=e.target.closest('.sort-item');
    if(item)onStart(item,e.clientX,e.clientY);
  });
  document.addEventListener('mousemove',handleMouseMove);
  document.addEventListener('mouseup',handleMouseUp);

  list.addEventListener('touchstart',function(e){
    const item=e.target.closest('.sort-item');
    if(item){e.preventDefault();onStart(item,e.touches[0].clientX,e.touches[0].clientY);}
  },{passive:false});
  document.addEventListener('touchmove',handleTouchMove,{passive:false});
  document.addEventListener('touchend',handleTouchEnd,{passive:true});

  // Cleanup when navigating away
  var obs=new MutationObserver(function(){
    if(!document.getElementById('sortList')){
      document.removeEventListener('mousemove',handleMouseMove);
      document.removeEventListener('mouseup',handleMouseUp);
      document.removeEventListener('touchmove',handleTouchMove);
      document.removeEventListener('touchend',handleTouchEnd);
      obs.disconnect();
    }
  });
  obs.observe(document.getElementById('gameArea'),{childList:true,subtree:false});
}

function initCatDrag(){
  let dragEl=null,ghost=null,startX=0,startY=0;

  function getDropZone(cx,cy){
    // Always use bounding rect check — reliable even for empty boxes
    const zones=['catBoxYes','catBoxNo','catPool'];
    for(let i=0;i<zones.length;i++){
      const el=document.getElementById(zones[i]);
      if(!el)continue;
      const r=el.getBoundingClientRect();
      if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom)return el;
    }
    // fallback: hit test
    const hit=document.elementFromPoint(cx,cy);
    if(!hit)return null;
    return hit.closest('#catBoxYes,#catBoxNo,#catPool');
  }

  function createGhost(el,cx,cy){
    const r=el.getBoundingClientRect();
    ghost=el.cloneNode(true);
    ghost.style.cssText='position:fixed;z-index:9999;left:'+r.left+'px;top:'+r.top+'px;width:'+r.width+'px;opacity:0.9;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5);transform:scale(1.08);transition:none;';
    document.body.appendChild(ghost);
    startX=cx-r.left;startY=cy-r.top;
  }

  function moveGhost(cx,cy){
    if(!ghost)return;
    ghost.style.left=(cx-startX)+'px';
    ghost.style.top=(cy-startY)+'px';
    // highlight drop zones
    ['catBoxYes','catBoxNo','catPool'].forEach(function(id){
      const el=document.getElementById(id);
      if(el)el.classList.remove('drag-active');
    });
    const zone=getDropZone(cx,cy);
    if(zone)zone.classList.add('drag-active');
  }

  function onStart(el,cx,cy){
    if(answered)return;
    dragEl=el;
    createGhost(el,cx,cy);
    el.style.opacity='0.3';
  }

  function updateHints(){
    ['catBoxYesItems','catBoxNoItems'].forEach(function(id){
      const box=document.getElementById(id);
      if(!box)return;
      const hasCards=box.querySelectorAll('.cat-item').length>0;
      let hint=box.querySelector('.cat-box-empty-hint');
      if(hasCards&&hint){hint.remove();}
      else if(!hasCards&&!hint){
        const h=document.createElement('div');h.className='cat-box-empty-hint';h.textContent='← Húzd ide a kártyákat';box.appendChild(h);
      }
    });
  }

  function onEnd(cx,cy){
    if(!dragEl)return;
    dragEl.style.opacity='';
    if(ghost){ghost.remove();ghost=null;}
    ['catBoxYes','catBoxNo','catPool'].forEach(function(id){
      const el=document.getElementById(id);
      if(el)el.classList.remove('drag-active');
    });
    const zone=getDropZone(cx,cy);
    if(zone){
      if(zone.id==='catBoxYes'){
        document.getElementById('catBoxYesItems').appendChild(dragEl);
        dragEl.setAttribute('data-placed','yes');
      } else if(zone.id==='catBoxNo'){
        document.getElementById('catBoxNoItems').appendChild(dragEl);
        dragEl.setAttribute('data-placed','no');
      } else {
        document.getElementById('catPool').appendChild(dragEl);
        dragEl.removeAttribute('data-placed');
      }
    }
    dragEl=null;
    updateHints();
  }

  // Click/tap cycle fallback — kis választómenü jelenik meg
  function catItemClick(el){
    if(answered)return;
    // Ha már van aktív popup, zárjuk be
    const existingPopup=document.getElementById('catClickPopup');
    if(existingPopup){existingPopup.remove();return;}

    const q=document.querySelector('.card').__catQ||(document.querySelector('.card').__catQ=null);
    // Lekérjük a boxYes/boxNo feliratát a DOM-ból
    const yesTitle=document.querySelector('#catBoxYes .cat-box-title');
    const noTitle=document.querySelector('#catBoxNo .cat-box-title');
    const yesLabel=yesTitle?yesTitle.textContent:'Igen';
    const noLabel=noTitle?noTitle.textContent:'Nem';

    const r=el.getBoundingClientRect();
    const popup=document.createElement('div');
    popup.id='catClickPopup';
    popup.style.cssText='position:fixed;z-index:10000;background:rgba(18,18,32,.97);border:1px solid rgba(124,58,237,.5);border-radius:12px;padding:8px;display:flex;flex-direction:column;gap:6px;box-shadow:0 8px 32px rgba(0,0,0,.7);min-width:180px;';
    // Pozícionálás az elem alá, de ne lógjon ki a képernyőről
    const top=Math.min(r.bottom+6, window.innerHeight-120);
    const left=Math.max(8, Math.min(r.left, window.innerWidth-200));
    popup.style.top=top+'px';
    popup.style.left=left+'px';

    function makePopupBtn(label, action){
      const btn=document.createElement('button');
      btn.textContent=label;
      btn.style.cssText='font-family:"Space Grotesk",sans-serif;font-size:.82rem;font-weight:600;padding:7px 12px;border-radius:8px;cursor:pointer;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#e2e8f0;text-align:left;transition:background .15s;';
      btn.onmouseenter=function(){this.style.background='rgba(124,58,237,.2)';};
      btn.onmouseleave=function(){this.style.background='rgba(255,255,255,.05)';};
      btn.onclick=function(ev){ev.stopPropagation();action();popup.remove();};
      return btn;
    }

    const placed=el.getAttribute('data-placed');
    if(placed!=='yes'){
      popup.appendChild(makePopupBtn('→ '+yesLabel, function(){
        document.getElementById('catBoxYesItems').appendChild(el);el.setAttribute('data-placed','yes');updateHints();
      }));
    }
    if(placed!=='no'){
      popup.appendChild(makePopupBtn('→ '+noLabel, function(){
        document.getElementById('catBoxNoItems').appendChild(el);el.setAttribute('data-placed','no');updateHints();
      }));
    }
    if(placed){
      popup.appendChild(makePopupBtn('↩ Vissza a készletbe', function(){
        document.getElementById('catPool').appendChild(el);el.removeAttribute('data-placed');updateHints();
      }));
    }

    document.body.appendChild(popup);
    // Kattintás máshová → bezárja a popupot
    setTimeout(function(){
      document.addEventListener('click',function closePopup(ev){
        if(!popup.contains(ev.target)){popup.remove();}
        document.removeEventListener('click',closePopup);
      });
    },10);
  }

  const container=document.querySelector('.card');
  if(!container)return;

  function handleMouseMove(e){if(dragEl)moveGhost(e.clientX,e.clientY);}
  function handleMouseUp(e){
    if(dragEl){
      if(ghost){
        const dx=Math.abs(e.clientX-(parseFloat(ghost.style.left)+startX));
        const dy=Math.abs(e.clientY-(parseFloat(ghost.style.top)+startY));
        if(dx<6&&dy<6){const el=dragEl;ghost.remove();ghost=null;dragEl.style.opacity='';dragEl=null;catItemClick(el);return;}
      }
      onEnd(e.clientX,e.clientY);
    }
  }
  function handleTouchMove(e){if(dragEl){e.preventDefault();moveGhost(e.touches[0].clientX,e.touches[0].clientY);}}
  function handleTouchEnd(e){if(dragEl){const t=e.changedTouches[0];onEnd(t.clientX,t.clientY);}}

  // Mouse
  container.addEventListener('mousedown',function(e){
    const item=e.target.closest('.cat-item');
    if(item)onStart(item,e.clientX,e.clientY);
  });
  document.addEventListener('mousemove',handleMouseMove);
  document.addEventListener('mouseup',handleMouseUp);

  // Touch
  container.addEventListener('touchstart',function(e){
    const item=e.target.closest('.cat-item');
    if(item){e.preventDefault();onStart(item,e.touches[0].clientX,e.touches[0].clientY);}
  },{passive:false});
  document.addEventListener('touchmove',handleTouchMove,{passive:false});
  document.addEventListener('touchend',handleTouchEnd,{passive:true});

  // Cleanup when navigating away
  var obs=new MutationObserver(function(){
    if(!document.getElementById('catPool')){
      document.removeEventListener('mousemove',handleMouseMove);
      document.removeEventListener('mouseup',handleMouseUp);
      document.removeEventListener('touchmove',handleTouchMove);
      document.removeEventListener('touchend',handleTouchEnd);
      obs.disconnect();
    }
  });
  obs.observe(document.getElementById('gameArea'),{childList:true,subtree:false});
}

function checkCat(){
  if(answered)return;
  const questions=shuffledQuestions.length?shuffledQuestions:currentTopic.cat;

  const pool=document.getElementById('catPool');

    res.textContent='⚠️ Még nem soroltad be az összes kártyát!';return;
  }
  answered=true;document.getElementById('catCheckBtn').disabled=true;
  let allOk=true;

    if(!isCorrect)allOk=false;
    el.classList.add(isCorrect?'correct-item':'wrong-item');
  });
  if(allOk){score++;streak++;if(streak>bestStreak)bestStreak=streak;}else{streak=0;}
  const pill=document.getElementById('streakPill');
  if(pill){pill.textContent=streakLabel();pill.className='streak-pill';void pill.offsetWidth;if(!allOk)pill.classList.add('broken');else{if(streak>=3)pill.classList.add('on-fire');pill.classList.add('pop');}}
  const res=document.getElementById('catResult');
  if(allOk){let prefix='✅ Tökéletes besorolás! ';if(streak>=5)prefix='🔥🔥 '+streak+' sorozat! ';else if(streak>=3)prefix='🔥 '+streak+' sorozat! ';res.className='cat-result show correct';res.textContent=prefix+q.explain;}
  else{res.className='cat-result show wrong';res.textContent='❌ Nem teljesen. '+q.explain;}
  document.getElementById('nextBtn').classList.add('show');
}

(function(){
  const THEMES = {
    fuves:      { cls:'theme-fuves',    pc:['#22c55e','#4ade80','#86efac','#fbbf24','#d9f99d','#a3e635'], ps:'tp',       em:['🌿','🌾','🌻','🐝','🦋','🌱','🌼','🍀','🐛','🦗'] },
    vizek:      { cls:'theme-vizek',    pc:['#38bdf8','#7dd3fc','#bae6fd','#0ea5e9','#e0f2fe','#93c5fd'], ps:'tp tp-w',  em:['💧','🐟','🦆','🐠','🌊','🐢','🦢','🐸','🦭','🌿'] },
    erdo:       { cls:'theme-erdo',     pc:['#14a050','#4ade80','#a3e635','#854d0e','#d97706','#86efac'], ps:'tp',       em:['🌲','🍂','🦔','🦌','🐿️','🍄','🦉','🌿','🐦','🍁'] },
    kolcsonhatasok: { cls:'theme-kolcson',  pc:['#f59e0b','#fbbf24','#ef4444','#fb923c','#fde68a','#fca5a5'], ps:'tp tp-r',  em:['⚡','🔋','🌡️','💡','🔥','⚙️','🧲','☀️','💥','🌊'] },
    fold:       { cls:'theme-fold',     pc:['#6366f1','#818cf8','#38bdf8','#a5b4fc','#e0e7ff','#7dd3fc'], ps:'tp tp-w',  em:['🌍','🪐','⭐','🌙','☄️','🌌','🔭','🛸','💫','🌠'] },
    termeszet:  { cls:'theme-termeszet',pc:['#dc2626','#f87171','#f59e0b','#fb923c','#fca5a5','#fde68a'], ps:'tp tp-r',  em:['🌋','⛰️','🌪️','🌊','❄️','🏔️','💨','🌩️','🔥','🌡️'] }
  };
  let active=null, tPart=[];

  function applyTheme(id){
    if(active===id)return;
    document.body.classList.remove('theme-fuves','theme-vizek','theme-erdo','theme-kolcson','theme-fold','theme-termeszet');
    clearTP(); clearEM();
    if(!id||!THEMES[id]){active=null;restoreP();return;}
    const T=THEMES[id];
    document.body.classList.add(T.cls);
    active=id;
    hideP(); spawnTP(T); spawnEM(T);
  }

  function clearTP(){tPart.forEach(function(p){if(p.parentNode)p.remove();});tPart=[];}
  function clearEM(){var c=document.getElementById('bgEmojiDeco');if(c)c.innerHTML='';}
  function hideP(){document.querySelectorAll('.particle:not(.tp)').forEach(function(p){p.style.opacity='0';p.style.transition='opacity 1s';});}
  function restoreP(){document.querySelectorAll('.particle:not(.tp)').forEach(function(p){p.style.opacity='';p.style.transition='';});}

  function spawnTP(T){
    for(var i=0;i<22;i++){
      var p=document.createElement('div');
      p.className='particle '+T.ps;
      var sz=Math.random()*5+2;
      var col=T.pc[Math.floor(Math.random()*T.pc.length)];
      p.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(Math.random()*100)+'vw;background:'+col+';box-shadow:0 0 '+(sz*2)+'px '+col+';animation-duration:'+(8+Math.random()*12)+'s;animation-delay:'+(Math.random()*10)+'s;';
      document.body.appendChild(p);
      tPart.push(p);
    }
  }

  function spawnEM(T){
    var c=document.getElementById('bgEmojiDeco');
    if(!c)return;
    for(var i=0;i<16;i++){
      var s=document.createElement('span');
      s.textContent=T.em[Math.floor(Math.random()*T.em.length)];
      var sz=(1.1+Math.random()*1.5);
      s.style.cssText='font-size:'+sz+'rem;left:'+(Math.random()*95)+'vw;animation-duration:'+(14+Math.random()*18)+'s;animation-delay:'+(Math.random()*14)+'s;';
      c.appendChild(s);
    }
  }

  var _ss=window.showSubtopics;
  window.showSubtopics=function(id){applyTheme(id);_ss(id);};
  var _sb=window.showBigTopics;
  window.showBigTopics=function(){applyTheme(null);_sb();};
  var _si=window.showSubtopicsInline;
  if(_si)window.showSubtopicsInline=function(bt){applyTheme(bt&&bt.id?bt.id:null);_si(bt);};
})();

showBigTopics();

.tananyag-blokk-kep{flex-shrink:0;width:140px;}
.tananyag-blokk-kep img{width:100%;border-radius:10px;border:1px solid rgba(255,255,255,.1);box-shadow:0 4px 16px rgba(0,0,0,.4);}
.tananyag-kep-felirat{font-size:.65rem;color:#475569;text-align:center;margin-top:4px;font-style:italic;line-height:1.3;}
@media(max-width:500px){.tananyag-blokk{flex-direction:column!important;}.tananyag-blokk-kep{width:100%;}}
.tananyag-fogalom-kep{display:flex;gap:12px;align-items:flex-start;}
.tananyag-fogalom-kep img{width:80px;border-radius:8px;border:1px solid rgba(255,255,255,.08);flex-shrink:0;}
.tananyag-fogalom-szoveg{flex:1;min-width:0;}
</style>
<script>
function openTananyag(){
  if(!currentTopic||!currentTopic.tananyag)return;
  var t=currentTopic.tananyag;
  var th=currentBigTopic?(CUBE_THEME[currentBigTopic.id]||CUBE_THEME.fuves):CUBE_THEME.fuves;
  var color=th.color||'#a78bfa';
  document.getElementById('tananyagIcon').textContent=currentTopic.icon;
  document.getElementById('tananyagTitle').textContent=currentTopic.title;
  var startBtn=document.getElementById('tananyagStartBtn');
  startBtn.style.borderColor=color;startBtn.style.color=color;startBtn.style.background='rgba(124,58,237,.1)';
  var html='';

  // ── Összefoglaló – opcionális kép jobbra ──
  if(t.bevezeto){
    var kepHTML='';
    if(t.bevezeto_kep){
      kepHTML='<div class="tananyag-blokk-kep"><img src="'+t.bevezeto_kep+'" alt="illusztráció">'+(t.bevezeto_kep_felirat?'<div class="tananyag-kep-felirat">'+t.bevezeto_kep_felirat+'</div>':'')+'</div>';
    }
    html+='<div class="tananyag-section"><div class="tananyag-section-title" style="color:'+color+'">📝 Összefoglaló</div>'+
      '<div class="tananyag-blokk kepjobb">'+
        '<div class="tananyag-blokk-szoveg"><p class="tananyag-text">'+t.bevezeto+'</p></div>'+
        kepHTML+
      '</div></div>';
  }

  // ── Fontos fogalmak – mindegyikhez opcionális kép ──
  if(t.fogalmak&&t.fogalmak.length){
    html+='<div class="tananyag-section"><div class="tananyag-section-title" style="color:'+color+'">🔑 Fontos fogalmak</div><div class="tananyag-fogalom-grid">';
    t.fogalmak.forEach(function(f){
      if(f.kep){
        html+='<div class="tananyag-fogalom"><div class="tananyag-fogalom-kep">'+
          '<img src="'+f.kep+'" alt="'+f.nev+'">'+
          '<div class="tananyag-fogalom-szoveg"><strong style="color:'+color+'">'+f.nev+'</strong><span>'+f.leiras+'</span></div>'+
          '</div></div>';
      } else {
        html+='<div class="tananyag-fogalom"><strong style="color:'+color+'">'+f.nev+'</strong><span>'+f.leiras+'</span></div>';
      }
    });
    html+='</div></div>';
  }

  // ── Érdekesség – opcionális kép ──
  if(t.erdekes){
    var eKepHTML='';
    if(t.erdekes_kep){
      eKepHTML='<div class="tananyag-blokk-kep" style="margin-top:6px;"><img src="'+t.erdekes_kep+'" alt="érdekesség">'+(t.erdekes_kep_felirat?'<div class="tananyag-kep-felirat">'+t.erdekes_kep_felirat+'</div>':'')+'</div>';
    }
    html+='<div class="tananyag-section"><div class="tananyag-blokk kepjobb"><div class="tananyag-blokk-szoveg"><div class="tananyag-erdekes"><p>'+t.erdekes+'</p></div></div>'+eKepHTML+'</div></div>';
  }

  document.getElementById('tananyagBody').innerHTML=html;
  document.getElementById('tananyagOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeTananyag(){
  document.getElementById('tananyagOverlay').classList.remove('open');
  document.body.style.overflow='';
}
function closeTananyagOnBg(e){if(e.target===document.getElementById('tananyagOverlay'))closeTananyag();}
</script>
</body>
</html>
